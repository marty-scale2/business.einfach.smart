<style>
:root {
  --orange:        #D8622A;
  --orange-bright: #E8894E;
  --orange-deep:   #B24E1E;

  --cream:         #FBF7F2;

  --t-lg:   clamp(1.25rem, 1.1rem + 0.7vw, 1.7rem);

  --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
  --fast: 160ms;

  --f-serif: 'Cormorant', Georgia, serif;
  --f-sans:  'Inter', -apple-system, 'Segoe UI', sans-serif;
  --f-brand: 'Montserrat', 'Inter', sans-serif;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {

  color: var(--text-primary);
  line-height: 1.6;

    radial-gradient(ellipse 90% 40% at 50% 0%, rgba(216,98,42,0.06), transparent 65%),

  display: flex;
  flex-direction: column;
}
img { display: block; max-width: 100%; }
a { color: inherit; }

.wrap { width: min(560px, 100% - clamp(2rem, 8vw, 4rem)); margin-inline: auto; flex: 1; display: flex; flex-direction: column; }

/* HEADLINE */
.headline {
  text-align: center;
  font-family: var(--f-serif);
  font-weight: 600;
  font-size: var(--t-lg);
  color: var(--ink);
  line-height: 1.28;
  margin: var(--s-8) 0 var(--s-8);
  text-wrap: balance;
}
.headline em {
  font-style: italic;
  color: var(--orange-deep);
}

/* VIDEO / STORY FRAME */
.story-frame {
  width: 100%;
  max-width: 360px;
  margin: 0 auto;
  border-radius: 20px;
  overflow: hidden;
  background: var(--ink);
  box-shadow: var(--shadow-md);
}
.story-frame wistia-player { display: block; width: 100%; }

/* SUBTEXT */
.subtext {
  text-align: center;
  font-size: var(--t-sm);
  color: var(--text-secondary);
  max-width: 40ch;
  margin: var(--s-8) auto 0;
}

/* FOOTER */
.footer { background: var(--ink); padding: var(--s-12) 0 var(--s-8); text-align: center; }
.footer__logo-chip {
  display: inline-flex; align-items: center; justify-content: center;

  background: #fff; border-radius: 12px; padding: 10px 16px;
  margin-bottom: var(--s-6);
}
.footer__logo { height: 26px; width: auto; }
.footer__jv {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--s-3);

.footer__links { display: flex; justify-content: center; align-items: center; gap: var(--s-6); margin-bottom: var(--s-3); flex-wrap: wrap; }
.footer__links a { font-size: var(--t-xs); color: rgba(255,255,255,0.55); text-decoration: none; }
.footer__links a:hover { color: var(--orange-bright); }
.footer__copy { font-size: var(--t-xs); color: rgba(255,255,255,0.35); }
